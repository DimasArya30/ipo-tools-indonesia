<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IPO Tools Indonesia — Kalkulator IPO Terlengkap</title>
    <meta name="description" content="Platform kalkulator IPO Indonesia. Estimasi penjatahan, kalkulator ARA ARB, dan kebutuhan modal multi akun." />
    <meta name="keywords" content="IPO, saham, penjatahan, ARA, ARB, BEI, investasi, kalkulator" />
    <meta name="author" content="IPO Tools Indonesia" />
    <meta property="og:title" content="IPO Tools Indonesia" />
    <meta property="og:description" content="Platform kalkulator IPO Indonesia terlengkap" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      (function(){
        var t=localStorage.getItem('ipo-theme');
        if(t==='dark'||(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
